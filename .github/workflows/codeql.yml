name: "CodeQL"

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  schedule:
    - cron: '30 18 * * 4'

jobs:
  analyze:
    name: Analyze
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      packages: read
      actions: read
      contents: read

    strategy:
      fail-fast: false
      matrix:
        include:
          # Changed build-mode to none as required by the Rust extractor
          - language: rust
            build-mode: none

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    # CodeQL for Rust still needs the toolchain available to parse dependencies
    - name: Install Rust Toolchain
      uses: dtolnay/rust-toolchain@stable

    - name: Initialize CodeQL
      uses: github/codeql-action/init@v4
      with:
        languages: ${{ matrix.language }}
        build-mode: ${{ matrix.build-mode }}

    # Note: The manual 'cargo build' step is removed entirely. 
    # CodeQL will analyze the codebase automatically during the next step.

    - name: Perform CodeQL Analysis
      uses: github/codeql-action/analyze@v4
      with:
        category: "/language:${{matrix.language}}"

[package]
name = "rustpolybot"
version = "0.1.0"
edition = "2021"

[dependencies]
polymarket-client-sdk = { version = "0.4", features = ["clob", "ws"] }
alloy = { version = "1.3", features = ["signer-local"] }
tokio = { version = "1", features = ["full"] }
dotenv = "0.15"
anyhow = "1.0"
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
rust_decimal = "1.36"
rust_decimal_macros = "1.36"
chrono = "0.4"
chrono-tz = "0.9"
futures = "0.3"
reqwest = { version = "0.12", features = ["json"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"

rustls = { version = "0.23", default-features = false, features = ["ring"] }
tokio-tungstenite = { version = "0.28.0", features = ["native-tls"] }
tungstenite = "0.28.0"
url = "2.5.8"
regex = "1.12.3"
urlencoding = "2.1.3"
